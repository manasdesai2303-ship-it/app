<!DOCTYPE html>
<html>
<head>
  <title>Goldsmith App</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f4f4f4; }
    button { padding: 10px; margin: 10px; }
    .box { background: white; margin: 20px; padding: 15px; border-radius: 10px; }
  </style>
</head>
<body>

<h1>Goldsmith App 💰</h1>

<div class="box">
  <h2>Clients</h2>
  <button onclick="loadClients()">Load Clients</button>
  <pre id="output"></pre>
</div>

<script>
async function loadClients() {
  const res = await fetch("https://goldsmith-backend-yi3l.onrender.com/api/clients");
  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
