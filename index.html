<!DOCTYPE html>
<html>
<head>
  <title>Goldsmith App</title>
</head>
<body>

<h2>Login</h2>

<input id="email" type="email" placeholder="email">
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<h2>Orders</h2>
<button onclick="getOrders()">Get Orders</button>

<pre id="output"></pre>

<script>
let token = "";

async function login() {
  const res = await fetch("https://goldsmith-backend-yi3l.onrender.com/api/auth/login-json", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

console.log(email, password);   // 🔍 debug line

const res = await fetch("https://goldsmith-backend-yi31.onrender.com/api/auth/login-json", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    email: email,
    password: password
  })
  });

  const data = await res.json();
console.log(data);   // VERY IMPORTANT

token = data.access_token || data.token || data.accessToken;

alert("Login successful!");

async function getOrders() {
  const res = await fetch("https://goldsmith-backend-yi3l.onrender.com/api/orders", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
