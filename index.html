<!DOCTYPE html>
<html>
<head>
  <title>Goldsmith App</title>
</head>

<body>

  <h2>Login</h2>

  <input id="email" type="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>

  <button onclick="login()">Login</button>

  <h2>Orders</h2>
  <button onclick="getOrders()">Get Orders</button>

  <pre id="output"></pre>

  <script>
    let token = "";

    async function login() {
      try {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        console.log(email, password); // debug

        const res = await fetch("https://goldsmith-backend-yi31.onrender.com/api/auth/login-json", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        });

        const data = await res.json();
        console.log(data);

        token = data.access_token || data.token || data.accessToken;

        if (token) {
          alert("Login successful");
        } else {
          alert("Login failed");
        }

      } catch (err) {
        console.error(err);
        alert("Error during login");
      }
    }

    async function getOrders() {
      try {
        const res = await fetch("https://goldsmith-backend-yi31.onrender.com/api/orders", {
          method: "GET",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        const data = await res.json();
        console.log(data);

        document.getElementById("output").innerText = JSON.stringify(data, null, 2);

      } catch (err) {
        console.error(err);
        alert("Error fetching orders");
      }
    }
  </script>

</body>
</html>
